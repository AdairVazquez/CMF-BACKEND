version: '3.8'

services:
  # Redis para cache y queues
  redis:
    image: redis:7-alpine
    container_name: cmf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - cmf_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MySQL (opcional, si quieres dockerizar la BD)
  # mysql:
  #   image: mysql:8.0
  #   container_name: cmf_mysql
  #   restart: unless-stopped
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
  #     MYSQL_DATABASE: ${DB_DATABASE:-system_core_api}
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - cmf_network

volumes:
  redis_data:
    driver: local
  # mysql_data:
  #   driver: local

networks:
  cmf_network:
    driver: bridge
